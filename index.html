<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🎤 Karaoke Night</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14;
      --surface: #16162a;
      --surface2: #1e1e38;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --accent3: #ec4899;
      --text: #f1f0ff;
      --muted: #8b87a8;
      --border: #2e2b4a;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ===== PLAYER ===== */
    #player-section {
      background: #000;
      position: relative;
      flex-shrink: 0;
    }
    #player-wrapper {
      width: 100%;
      padding-top: 56.25%;
      position: relative;
    }
    #player-wrapper iframe,
    #player-wrapper #yt-player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    #player-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      flex-direction: column;
      gap: 12px;
      z-index: 5;
    }
    #player-overlay.hidden { display: none; }
    #overlay-title {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      padding: 0 20px;
    }
    #overlay-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .play-big-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      color: #fff;
      box-shadow: 0 0 20px rgba(124,58,237,0.6);
      transition: transform 0.15s;
    }
    .play-big-btn:active { transform: scale(0.92); }

    /* now-playing bar */
    #now-playing-bar {
      background: linear-gradient(90deg, var(--surface2), var(--surface));
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      flex-shrink: 0;
    }
    #np-thumb {
      width: 38px; height: 38px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    #np-info { flex: 1; min-width: 0; }
    #np-title {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #np-channel { font-size: 11px; color: var(--muted); }
    #np-status {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
      white-space: nowrap;
    }
    #skip-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    #skip-btn:hover { background: var(--surface2); color: var(--text); }

    /* ===== TABS ===== */
    #tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn .tab-icon { font-size: 18px; }
    .tab-btn.active {
      color: var(--accent2);
      border-bottom-color: var(--accent2);
    }
    .tab-badge {
      background: var(--accent3);
      color: #fff;
      border-radius: 10px;
      font-size: 9px;
      padding: 1px 5px;
      min-width: 16px;
      text-align: center;
    }

    /* ===== PANELS ===== */
    #panels {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 14px;
      display: none;
    }
    .panel.active { display: block; }

    /* ===== SEARCH ===== */
    #search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    #search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

    /* url-add */
    #url-add-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    #url-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
    }
    #url-input::placeholder { color: var(--muted); }
    #url-input:focus { border-color: var(--accent); }

    /* song cards */
    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .song-card:hover { border-color: var(--accent); }
    .song-card img {
      width: 72px; height: 54px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .song-card-info { flex: 1; min-width: 0; }
    .song-card-title {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .song-card-channel { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .song-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-sm:hover { background: var(--surface2); border-color: var(--accent); }
    .btn-sm.danger:hover { background: rgba(239,68,68,0.15); border-color: var(--danger); color: var(--danger); }
    .btn-sm.success { border-color: var(--success); color: var(--success); }
    .btn-sm.accent { border-color: var(--accent2); color: var(--accent2); }

    /* loading / empty */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--muted);
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* queue items */
    .queue-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .queue-num {
      font-size: 18px;
      font-weight: 800;
      color: var(--muted);
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .queue-item.now { border-color: var(--accent2); background: rgba(124,58,237,0.1); }
    .queue-item.now .queue-num { color: var(--accent2); }
    .queue-remove {
      margin-left: auto;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      flex-shrink: 0;
    }
    .queue-remove:hover { color: var(--danger); }

    /* section headers */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .section-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      box-shadow: var(--shadow);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* history items */
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      opacity: 0.85;
    }
    .history-item img {
      width: 56px; height: 42px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .history-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* search source badge */
    #search-source-badge {
      font-size: 11px;
      color: var(--success);
      margin-bottom: 8px;
      display: none;
      align-items: center;
      gap: 5px;
    }
    #search-source-badge.show { display: flex; }

    /* error badge */
    .error-badge {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 12px;
    }

    /* scrollbar */
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- PLAYER -->
  <div id="player-section">
    <div id="player-wrapper">
      <div id="yt-player"></div>
      <div id="player-overlay">
        <div class="empty-icon">🎤</div>
        <div id="overlay-title">Karaoke Night</div>
        <div id="overlay-sub">Search a song and add it to the queue</div>
      </div>
    </div>
  </div>

  <!-- NOW PLAYING BAR -->
  <div id="now-playing-bar">
    <img id="np-thumb" src="" alt="" onerror="this.style.display='none'" />
    <div id="np-info">
      <div id="np-title">Nothing playing</div>
      <div id="np-channel"></div>
    </div>
    <span id="np-status">Idle</span>
    <button id="skip-btn" onclick="skipSong()">⏭ Skip</button>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('search')" id="tab-search">
      <span class="tab-icon">🔍</span>Search
    </button>
    <button class="tab-btn" onclick="showTab('queue')" id="tab-queue">
      <span class="tab-icon">📋</span>Queue<span class="tab-badge" id="queue-badge" style="display:none">0</span>
    </button>
    <button class="tab-btn" onclick="showTab('library')" id="tab-library">
      <span class="tab-icon">🎵</span>Library
    </button>
    <button class="tab-btn" onclick="showTab('history')" id="tab-history">
      <span class="tab-icon">🕐</span>History
    </button>
  </div>

  <!-- PANELS -->
  <div id="panels">

    <!-- SEARCH PANEL -->
    <div class="panel active" id="panel-search">
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="Search karaoke songs..." autocomplete="off"
          onkeydown="if(event.key==='Enter')doSearch()" />
        <button class="btn-primary" id="search-btn" onclick="doSearch()">Search</button>
      </div>
      <div id="search-source-badge">✅ YouTube Data API v3</div>
      <div id="url-add-bar">
        <input type="text" id="url-input" placeholder="Paste YouTube URL to add directly..." />
        <button class="btn-primary" onclick="addByUrl()">Add</button>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- QUEUE PANEL -->
    <div class="panel" id="panel-queue">
      <div class="section-header">
        <span class="section-title">Up Next</span>
        <button class="btn-sm danger" onclick="clearQueue()">Clear All</button>
      </div>
      <div id="queue-list"></div>
    </div>

    <!-- LIBRARY PANEL -->
    <div class="panel" id="panel-library">
      <div class="section-header">
        <span class="section-title">My Library</span>
        <span class="section-sub" id="library-count">0 songs</span>
      </div>
      <div id="library-list"></div>
    </div>

    <!-- HISTORY PANEL -->
    <div class="panel" id="panel-history">
      <div class="section-header">
        <span class="section-title">Play History</span>
        <button class="btn-sm danger" onclick="clearHistory()">Clear</button>
      </div>
      <div id="history-list"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
/* ===================================================
   KARAOKE NIGHT — YouTube Data API v3 Edition
   =================================================== */

// ---- CONFIG ----
const YT_API_KEY  = 'AIzaSyCWzhn3IAmlb97C0MEQmxcbd6ctY2je_ec';
const YT_SEARCH_URL = 'https://www.googleapis.com/youtube/v3/search';
const INTRO_VIDEO_ID = '8ZP5eqm4JqM';

// ---- STATE ----
let player        = null;
let playerReady   = false;
let currentSong   = null;
let isIntro       = false;
let queue         = [];
let library       = [];
let history       = [];
let nextPosition  = 1;

// ---- INIT ----
function init() {
  loadData();
  renderQueue();
  renderLibrary();
  renderHistory();
  updateNowPlayingBar(null, 'idle');
}

// ---- PERSISTENCE ----
function saveData() {
  try {
    localStorage.setItem('kn_queue',   JSON.stringify(queue));
    localStorage.setItem('kn_library', JSON.stringify(library));
    localStorage.setItem('kn_history', JSON.stringify(history));
    localStorage.setItem('kn_nextPos', String(nextPosition));
  } catch(e) { console.warn('Save failed', e); }
}

function loadData() {
  try {
    queue       = JSON.parse(localStorage.getItem('kn_queue')   || '[]');
    library     = JSON.parse(localStorage.getItem('kn_library') || '[]');
    history     = JSON.parse(localStorage.getItem('kn_history') || '[]');
    nextPosition = parseInt(localStorage.getItem('kn_nextPos')  || '1', 10);
  } catch(e) { queue=[]; library=[]; history=[]; nextPosition=1; }
}

// ---- YOUTUBE IFRAME API ----
window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('yt-player', {
    height: '100%', width: '100%',
    playerVars: {
      autoplay: 1, controls: 1, rel: 0,
      modestbranding: 1, playsinline: 1
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange
    }
  });
};

function onPlayerReady(e) {
  playerReady = true;
  // Play intro video
  isIntro = true;
  e.target.loadVideoById(INTRO_VIDEO_ID);
  updateNowPlayingBar({ title: 'Intro', channel_title: 'Karaoke Night', thumbnail_url: '' }, 'intro');
  hideOverlay();
}

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) {
    if (isIntro) {
      isIntro = false;
      playNext();
    } else {
      // move current to history
      if (currentSong) {
        history.unshift({ ...currentSong, played_at: new Date().toLocaleString() });
        if (history.length > 100) history.pop();
        saveData();
        renderHistory();
      }
      currentSong = null;
      playNext();
    }
  }
  if (e.data === YT.PlayerState.PLAYING && !isIntro) {
    updateNowPlayingBar(currentSong, 'playing');
  }
  if (e.data === YT.PlayerState.PAUSED && !isIntro) {
    updateNowPlayingBar(currentSong, 'paused');
  }
}

function playNext() {
  const next = queue.shift();
  saveData();
  renderQueue();
  if (next) {
    currentSong = next;
    if (playerReady) {
      player.loadVideoById(next.video_id);
      hideOverlay();
    }
    updateNowPlayingBar(next, 'loading');
  } else {
    currentSong = null;
    updateNowPlayingBar(null, 'idle');
    showOverlay('Queue Empty', 'Add songs to keep the party going!');
  }
}

function skipSong() {
  if (isIntro) { isIntro = false; }
  if (currentSong) {
    history.unshift({ ...currentSong, played_at: new Date().toLocaleString() });
    if (history.length > 100) history.pop();
    currentSong = null;
    saveData();
    renderHistory();
  }
  playNext();
  toast('Skipped ⏭');
}

// ---- SEARCH (YouTube Data API v3) ----
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  const resultsDiv  = document.getElementById('search-results');
  const searchBtn   = document.getElementById('search-btn');
  const sourceBadge = document.getElementById('search-source-badge');

  resultsDiv.innerHTML  = '<div class="loading-spinner"><div class="spinner"></div><span>Searching YouTube...</span></div>';
  sourceBadge.classList.remove('show');
  searchBtn.disabled    = true;

  try {
    const params = new URLSearchParams({
      part: 'snippet',
      type: 'video',
      q: q + ' karaoke',
      maxResults: '10',
      key: YT_API_KEY
    });

    const res  = await fetch(`${YT_SEARCH_URL}?${params}`);
    const data = await res.json();

    if (!res.ok) {
      const msg = data?.error?.message || `HTTP ${res.status}`;
      resultsDiv.innerHTML = `<div class="error-badge">⚠️ YouTube API error: ${msg}</div>`;
      return;
    }

    const items = data.items || [];
    if (!items.length) {
      resultsDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>No results found. Try a different search.</p></div>';
      return;
    }

    // Show source badge
    sourceBadge.classList.add('show');

    const songs = items.map(item => ({
      video_id:      item.id.videoId,
      title:         item.snippet.title,
      channel_title: item.snippet.channelTitle,
      thumbnail_url: item.snippet.thumbnails?.medium?.url
                     || item.snippet.thumbnails?.default?.url
                     || `https://i.ytimg.com/vi/${item.id.videoId}/mqdefault.jpg`
    }));

    resultsDiv.innerHTML = songs.map(s => songCardHTML(s, 'search')).join('');

  } catch (err) {
    resultsDiv.innerHTML = `<div class="error-badge">⚠️ Network error: ${err.message}</div>`;
  } finally {
    searchBtn.disabled = false;
  }
}

// ---- ADD BY URL ----
async function addByUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  const id = extractVideoId(url);
  if (!id) { toast('⚠️ Could not parse YouTube URL'); return; }

  try {
    const res  = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
    const data = await res.json();
    const song = {
      video_id:      id,
      title:         data.title || 'Unknown Title',
      channel_title: data.author_name || '',
      thumbnail_url: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`
    };
    addToQueue(song);
    document.getElementById('url-input').value = '';
    toast('Added to queue ✅');
  } catch(e) {
    // Fallback — add with minimal metadata
    addToQueue({ video_id: id, title: `Video ${id}`, channel_title: '', thumbnail_url: `https://i.ytimg.com/vi/${id}/mqdefault.jpg` });
    document.getElementById('url-input').value = '';
    toast('Added to queue ✅');
  }
}

function extractVideoId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// ---- QUEUE ----
function addToQueue(song) {
  queue.push({ ...song, pos: nextPosition++ });
  saveData();
  renderQueue();
  updateQueueBadge();
  // If nothing is playing, start immediately
  if (!currentSong && !isIntro && playerReady) {
    currentSong = queue.shift();
    saveData();
    renderQueue();
    player.loadVideoById(currentSong.video_id);
    hideOverlay();
    updateNowPlayingBar(currentSong, 'loading');
  }
  toast(`Added: ${song.title.slice(0, 40)}`);
}

function removeFromQueue(index) {
  queue.splice(index, 1);
  saveData();
  renderQueue();
}

function clearQueue() {
  if (!queue.length) return;
  queue = [];
  saveData();
  renderQueue();
  toast('Queue cleared');
}

function renderQueue() {
  const el = document.getElementById('queue-list');
  updateQueueBadge();
  if (!queue.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Queue is empty.<br>Search songs and add them!</p></div>';
    return;
  }
  el.innerHTML = queue.map((s, i) => `
    <div class="queue-item${i === 0 ? ' now' : ''}">
      <div class="queue-num">${i === 0 ? '▶' : i + 1}</div>
      <img src="${s.thumbnail_url}" onerror="this.style.display='none'" width="56" height="42" style="border-radius:6px;object-fit:cover;flex-shrink:0" />
      <div style="flex:1;min-width:0">
        <div class="song-card-title" style="font-size:12px">${escHtml(s.title)}</div>
        <div class="song-card-channel">${escHtml(s.channel_title || '')}</div>
      </div>
      <button class="queue-remove" onclick="removeFromQueue(${i})" title="Remove">✕</button>
    </div>
  `).join('');
}

function updateQueueBadge() {
  const badge = document.getElementById('queue-badge');
  if (queue.length > 0) {
    badge.textContent = queue.length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

// ---- LIBRARY ----
function addToLibrary(song) {
  if (library.find(s => s.video_id === song.video_id)) {
    toast('Already in library');
    return;
  }
  library.push({ ...song, added_at: new Date().toISOString() });
  saveData();
  renderLibrary();
  toast('Saved to library 🎵');
}

function removeFromLibrary(video_id) {
  library = library.filter(s => s.video_id !== video_id);
  saveData();
  renderLibrary();
  toast('Removed from library');
}

function renderLibrary() {
  const el = document.getElementById('library-list');
  document.getElementById('library-count').textContent = `${library.length} song${library.length !== 1 ? 's' : ''}`;
  if (!library.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎵</div><p>No saved songs yet.<br>Search and save your favourites!</p></div>';
    return;
  }
  el.innerHTML = library.map(s => songCardHTML(s, 'library')).join('');
}

// ---- HISTORY ----
function clearHistory() {
  history = [];
  saveData();
  renderHistory();
  toast('History cleared');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🕐</div><p>No songs played yet.</p></div>';
    return;
  }
  el.innerHTML = history.map(s => `
    <div class="history-item">
      <img src="${s.thumbnail_url}" onerror="this.style.display='none'" />
      <div style="flex:1;min-width:0">
        <div class="song-card-title" style="font-size:12px">${escHtml(s.title)}</div>
        <div class="history-time">${escHtml(s.played_at || '')}</div>
      </div>
      <button class="btn-sm" onclick="addToQueue(${escAttr(JSON.stringify(s))})">▶ Queue</button>
    </div>
  `).join('');
}

// ---- UI HELPERS ----
function songCardHTML(song, context) {
  const inLibrary = library.find(s => s.video_id === song.video_id);
  const libBtn = context === 'library'
    ? `<button class="btn-sm danger" onclick="removeFromLibrary('${song.video_id}')">🗑 Remove</button>`
    : inLibrary
      ? `<button class="btn-sm" disabled>✓ Saved</button>`
      : `<button class="btn-sm" onclick="addToLibrary(${escAttr(JSON.stringify(song))})">💾 Save</button>`;

  return `
    <div class="song-card">
      <img src="${song.thumbnail_url}" onerror="this.style.display='none'" loading="lazy" />
      <div class="song-card-info">
        <div class="song-card-title">${escHtml(song.title)}</div>
        <div class="song-card-channel">${escHtml(song.channel_title || '')}</div>
        <div class="song-card-actions">
          <button class="btn-sm accent" onclick="addToQueue(${escAttr(JSON.stringify(song))})">▶ Queue</button>
          ${libBtn}
        </div>
      </div>
    </div>`;
}

function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'library') renderLibrary();
  if (name === 'queue')   renderQueue();
  if (name === 'history') renderHistory();
}

function hideOverlay() {
  document.getElementById('player-overlay').classList.add('hidden');
}
function showOverlay(title, sub) {
  const overlay = document.getElementById('player-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent   = sub;
}

function updateNowPlayingBar(song, status) {
  const thumb   = document.getElementById('np-thumb');
  const title   = document.getElementById('np-title');
  const channel = document.getElementById('np-channel');
  const statusEl = document.getElementById('np-status');
  const statusMap = { idle: 'Idle', loading: 'Loading…', playing: '▶ Playing', paused: '⏸ Paused', intro: '🎬 Intro' };

  if (song) {
    thumb.src = song.thumbnail_url || '';
    thumb.style.display = song.thumbnail_url ? 'block' : 'none';
    title.textContent   = song.title || 'Unknown';
    channel.textContent = song.channel_title || '';
  } else {
    thumb.style.display = 'none';
    title.textContent   = 'Nothing playing';
    channel.textContent = '';
  }
  statusEl.textContent = statusMap[status] || status;
  statusEl.style.background = status === 'playing' ? 'var(--success)'
    : status === 'paused'  ? 'var(--warning)'
    : status === 'intro'   ? 'var(--accent3)'
    : 'var(--accent)';
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ---- BOOT ----
init();
</script>

<script src="https://www.youtube.com/iframe_api" async></script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 Karaoke Night</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --bg2: #16162a;
    --bg3: #1e1e35;
    --bg4: #252540;
    --pink: #ff2d78;
    --pink-dim: rgba(255,45,120,0.15);
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.15);
    --purple: #b44bff;
    --purple-dim: rgba(180,75,255,0.15);
    --text: #f0f0ff;
    --text-dim: #8888aa;
    --border: rgba(255,255,255,0.08);
    --card: #1a1a2e;
    --nav-h: 64px;
    --header-h: 60px;
    --player-h: 0px;
  }

  html, body {
    height: 100%;
    font-family: 'Poppins', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  /* Header */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #header h1 {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  /* Player Bar */
  #player-bar {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    z-index: 90;
    display: none;
    flex-direction: column;
  }
  #player-bar.active { display: flex; }
  #player-title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    gap: 10px;
  }
  #player-title-bar .song-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--cyan);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  #player-title-bar .player-btns {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #player-iframe-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
  }
  #player-iframe-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* Main Content */
  #main {
    position: fixed;
    left: 0; right: 0;
    top: var(--header-h);
    bottom: var(--nav-h);
    overflow-y: auto;
    padding: 16px;
    transition: top 0.3s ease;
  }

  /* Tabs */
  .tab { display: none; }
  .tab.active { display: block; }

  /* Bottom Nav */
  #nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: rgba(15,15,26,0.97);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-family: 'Poppins', system-ui, sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    transition: color 0.2s;
    position: relative;
  }
  .nav-btn .icon { font-size: 1.3rem; }
  .nav-btn.active { color: var(--pink); }
  .nav-btn.active::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    border-radius: 0 0 4px 4px;
  }
  .nav-badge {
    position: absolute;
    top: 6px; right: calc(50% - 18px);
    background: var(--pink);
    color: #fff;
    font-size: 0.55rem;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  /* Search */
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-box input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Poppins', system-ui, sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--cyan); }
  .search-box input::placeholder { color: var(--text-dim); }
  .btn {
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-family: 'Poppins', system-ui, sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
  }
  .btn-secondary {
    background: var(--bg4);
    color: var(--text);
  }
  .btn-cyan {
    background: linear-gradient(135deg, var(--cyan), #0099cc);
    color: #000;
  }
  .btn-sm {
    padding: 6px 12px;
    font-size: 0.75rem;
    border-radius: 8px;
  }
  .btn-icon {
    padding: 8px;
    border-radius: 8px;
    font-size: 1rem;
    line-height: 1;
  }
  .btn-danger {
    background: rgba(255,60,60,0.15);
    color: #ff6060;
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }

  .result-card {
    display: flex;
    gap: 0;
    flex-direction: column;
  }
  .result-card .card-media {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: var(--bg3);
  }
  .result-card .card-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .result-card:hover .card-media img { transform: scale(1.03); }
  .result-card .card-media .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.35);
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 3rem;
    cursor: pointer;
  }
  .result-card:hover .play-overlay { opacity: 1; }
  .result-card .card-info {
    padding: 12px 14px;
  }
  .card-title {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-channel {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Queue / Library / History cards */
  .song-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
  }
  .song-card .thumb {
    width: 72px;
    height: 50px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg3);
  }
  .song-card .song-info {
    flex: 1;
    min-width: 0;
  }
  .song-card .song-info .s-title {
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .song-card .song-info .s-channel {
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .song-card .song-info .s-meta {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .song-card .song-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .position-badge {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--pink-dim);
    color: var(--pink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 8px;
  }
  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-dim);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.5; }
  .empty-state strong { color: var(--text); }

  /* Spinner */
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 32px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast-container {
    position: fixed;
    bottom: calc(var(--nav-h) + 12px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg4);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 0.82rem;
    font-weight: 500;
    border: 1px solid var(--border);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
    white-space: nowrap;
  }
  .toast.success { border-color: var(--cyan); color: var(--cyan); }
  .toast.error { border-color: var(--pink); color: var(--pink); }
  @keyframes toastIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform: translateY(-8px); } }

  /* Now playing mini */
  .now-playing-strip {
    background: linear-gradient(135deg, var(--pink-dim), var(--purple-dim));
    border: 1px solid rgba(255,45,120,0.3);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .now-playing-strip .pulse {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--pink);
    animation: pulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity:1; }
    50% { transform: scale(1.4); opacity:0.6; }
  }
  .now-playing-strip .np-text {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--pink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  /* Glow effect on play */
  .glow-pink { box-shadow: 0 0 20px rgba(255,45,120,0.4); }
  .glow-cyan { box-shadow: 0 0 20px rgba(0,212,255,0.3); }

  /* Grid for search results on larger screens */
  @media (min-width: 600px) {
    #results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    #results-grid .card { margin-bottom: 0; }
  }
  @media (min-width: 900px) {
    #results-grid { grid-template-columns: 1fr 1fr 1fr; }
    #main { max-width: 960px; margin: 0 auto; }
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0 12px 0;
  }

  .queue-play-next {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 12px 0;
    width: 100%;
    font-family: 'Poppins', system-ui, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(255,45,120,0.35);
  }
  .queue-play-next:active { transform: scale(0.98); }
  .queue-play-next:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div id="header">
  <h1>🎤 Karaoke Night</h1>
</div>

<div id="player-bar">
  <div id="player-title-bar">
    <div class="pulse" style="width:10px;height:10px;border-radius:50%;background:var(--pink);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0;"></div>
    <span class="song-name" id="player-song-name">Loading...</span>
    <div class="player-btns">
      <button class="btn btn-sm btn-cyan" onclick="markPlayed()">✅ Played</button>
      <button class="btn btn-sm btn-secondary" onclick="closePlayer()">✕</button>
    </div>
  </div>
  <div id="player-iframe-wrap">
    <iframe id="yt-iframe" src="" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<div id="main">
  <!-- Search Tab -->
  <div class="tab active" id="tab-search">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search for karaoke songs..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-primary" onclick="doSearch()">🔍</button>
    </div>
    <div id="search-status"></div>
    <div id="results-grid"></div>
  </div>

  <!-- Queue Tab -->
  <div class="tab" id="tab-queue">
    <div class="section-header">
      <span class="section-title">Up Next 🎶</span>
    </div>
    <button class="queue-play-next" id="play-next-btn" onclick="playNext()">▶ Play Next Song</button>
    <div id="queue-list"></div>
  </div>

  <!-- Library Tab -->
  <div class="tab" id="tab-library">
    <div class="section-header">
      <span class="section-title">My Library 📚</span>
      <button class="btn btn-sm btn-danger" onclick="clearLibrary()" style="font-size:0.7rem;">Clear All</button>
    </div>
    <div id="library-list"></div>
  </div>

  <!-- History Tab -->
  <div class="tab" id="tab-history">
    <div class="section-header">
      <span class="section-title">History 🕐</span>
      <button class="btn btn-sm btn-danger" onclick="clearHistory()" style="font-size:0.7rem;">Clear</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<nav id="nav">
  <button class="nav-btn active" id="nav-search" onclick="switchTab('search')">
    <span class="icon">🔍</span>
    <span>Search</span>
  </button>
  <button class="nav-btn" id="nav-queue" onclick="switchTab('queue')">
    <span class="icon">🎶</span>
    <span>Queue</span>
    <span class="nav-badge" id="queue-badge" style="display:none;">0</span>
  </button>
  <button class="nav-btn" id="nav-library" onclick="switchTab('library')">
    <span class="icon">📚</span>
    <span>Library</span>
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
    <span class="icon">🕐</span>
    <span>History</span>
  </button>
</nav>

<div id="toast-container"></div>

<script>
  const API_KEY = 'AIzaSyCWzhn3IAmlb97C0MEQmxcbd6ctY2je_ec';
  let currentTab = 'search';
  let currentSong = null;

  // ---- LocalStorage Helpers ----
  function getLibrary() {
    try { return JSON.parse(localStorage.getItem('karaokeLibrary')) || []; } catch(e) { return []; }
  }
  function saveLibrary(arr) {
    localStorage.setItem('karaokeLibrary', JSON.stringify(arr));
  }
  function getQueue() {
    try { return JSON.parse(localStorage.getItem('karaokeQueue')) || []; } catch(e) { return []; }
  }
  function saveQueue(arr) {
    localStorage.setItem('karaokeQueue', JSON.stringify(arr));
  }
  function getHistory() {
    try { return JSON.parse(localStorage.getItem('karaokeHistory')) || []; } catch(e) { return []; }
  }
  function saveHistory(arr) {
    localStorage.setItem('karaokeHistory', JSON.stringify(arr));
  }

  // ---- Tab Switching ----
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('nav-' + tab).classList.add('active');
    currentTab = tab;
    if (tab === 'queue') renderQueue();
    if (tab === 'library') renderLibrary();
    if (tab === 'history') renderHistory();
  }

  // ---- Toast ----
  function showToast(msg, type='') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast' + (type ? ' ' + type : '');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 2600);
  }

  // ---- Search ----
  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { showToast('Enter a song to search!', 'error'); return; }
    const status = document.getElementById('search-status');
    const grid = document.getElementById('results-grid');
    status.innerHTML = '<div class="spinner"></div>';
    grid.innerHTML = '';
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${encodeURIComponent(q)}+karaoke&maxResults=10&key=${API_KEY}`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      status.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🎤</div><p>No results found. Try a different search!</p></div>';
        return;
      }
      grid.innerHTML = '';
      data.items.forEach(item => {
        const vid = item.id.videoId;
        const title = item.snippet.title;
        const channel = item.snippet.channelTitle;
        const thumb = item.snippet.thumbnails.medium.url;
        const card = document.createElement('div');
        card.className = 'card result-card';
        card.innerHTML = `
          <div class="card-media">
            <img src="${esc(thumb)}" alt="${esc(title)}" loading="lazy">
            <div class="play-overlay" onclick="playSong({videoId:'${esc(vid)}',title:${JSON.stringify(title)},channelTitle:${JSON.stringify(channel)},thumbnailUrl:${JSON.stringify(thumb)},addedAt:new Date().toISOString()})">▶️</div>
          </div>
          <div class="card-info">
            <div class="card-title">${esc(title)}</div>
            <div class="card-channel">${esc(channel)}</div>
            <div class="card-actions">
              <button class="btn btn-sm btn-primary" onclick='addToQueue({videoId:${JSON.stringify(vid)},title:${JSON.stringify(title)},channelTitle:${JSON.stringify(channel)},thumbnailUrl:${JSON.stringify(thumb)},addedAt:new Date().toISOString()})'>+ Queue</button>
              <button class="btn btn-sm btn-cyan" onclick='saveToLibrary({videoId:${JSON.stringify(vid)},title:${JSON.stringify(title)},channelTitle:${JSON.stringify(channel)},thumbnailUrl:${JSON.stringify(thumb)},addedAt:new Date().toISOString()})'>💾 Save</button>
              <button class="btn btn-sm btn-secondary" onclick='playSong({videoId:${JSON.stringify(vid)},title:${JSON.stringify(title)},channelTitle:${JSON.stringify(channel)},thumbnailUrl:${JSON.stringify(thumb)},addedAt:new Date().toISOString()})'>▶ Play</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    } catch(e) {
      status.innerHTML = '';
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p><strong>Search failed.</strong><br>Check your connection or API quota.</p></div>`;
      console.error(e);
    }
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ---- Queue ----
  function addToQueue(song) {
    const q = getQueue();
    if (q.find(s => s.videoId === song.videoId)) { showToast('Already in queue!', 'error'); return; }
    song.position = q.length + 1;
    song.played = false;
    q.push(song);
    saveQueue(q);
    updateQueueBadge();
    showToast('Added to queue! 🎶', 'success');
    if (currentTab === 'queue') renderQueue();
  }

  function removeFromQueue(videoId) {
    let q = getQueue().filter(s => s.videoId !== videoId);
    q.forEach((s,i) => s.position = i+1);
    saveQueue(q);
    updateQueueBadge();
    renderQueue();
    showToast('Removed from queue.');
  }

  function playNext() {
    const q = getQueue();
    if (q.length === 0) { showToast('Queue is empty!', 'error'); return; }
    playSong(q[0]);
  }

  function renderQueue() {
    const q = getQueue();
    const el = document.getElementById('queue-list');
    const btn = document.getElementById('play-next-btn');
    if (q.length === 0) {
      btn.disabled = true;
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎶</div><p>Your queue is empty.<br><strong>Search for songs</strong> and add them to the queue!</p></div>';
      return;
    }
    btn.disabled = false;
    el.innerHTML = '';
    q.forEach((song, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="song-card">
          <div class="position-badge">${i+1}</div>
          <img class="thumb" src="${esc(song.thumbnailUrl)}" alt="" loading="lazy">
          <div class="song-info">
            <div class="s-title">${esc(song.title)}</div>
            <div class="s-channel">${esc(song.channelTitle)}</div>
          </div>
          <div class="song-actions">
            <button class="btn btn-sm btn-primary btn-icon" onclick='playSong(${JSON.stringify(song)})' title="Play">▶</button>
            <button class="btn btn-sm btn-danger btn-icon" onclick="removeFromQueue('${esc(song.videoId)}')" title="Remove">✕</button>
          </div>
        </div>`;
      el.appendChild(card);
    });
  }

  function updateQueueBadge() {
    const q = getQueue();
    const badge = document.getElementById('queue-badge');
    if (q.length > 0) { badge.style.display='flex'; badge.textContent=q.length; }
    else { badge.style.display='none'; }
  }

  // ---- Library ----
  function saveToLibrary(song) {
    const lib = getLibrary();
    if (lib.find(s => s.videoId === song.videoId)) { showToast('Already in library!', 'error'); return; }
    lib.unshift(song);
    saveLibrary(lib);
    showToast('Saved to library! 📚', 'success');
    if (currentTab === 'library') renderLibrary();
  }

  function removeFromLibrary(videoId) {
    saveLibrary(getLibrary().filter(s => s.videoId !== videoId));
    renderLibrary();
    showToast('Removed from library.');
  }

  function clearLibrary() {
    if (!confirm('Clear entire library?')) return;
    saveLibrary([]);
    renderLibrary();
    showToast('Library cleared.');
  }

  function renderLibrary() {
    const lib = getLibrary();
    const el = document.getElementById('library-list');
    if (lib.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><p>Your library is empty.<br><strong>Save songs</strong> from search results to build your collection!</p></div>';
      return;
    }
    el.innerHTML = '';
    lib.forEach(song => {
      const card = document.createElement('div');
      card.className = 'card';
      const d = new Date(song.addedAt);
      const dateStr = d.toLocaleDateString();
      card.innerHTML = `
        <div class="song-card">
          <img class="thumb" src="${esc(song.thumbnailUrl)}" alt="" loading="lazy">
          <div class="song-info">
            <div class="s-title">${esc(song.title)}</div>
            <div class="s-channel">${esc(song.channelTitle)}</div>
            <div class="s-meta">Saved ${dateStr}</div>
          </div>
          <div class="song-actions">
            <button class="btn btn-sm btn-primary btn-icon" onclick='addToQueue(${JSON.stringify(song)})' title="Add to Queue">+🎶</button>
            <button class="btn btn-sm btn-secondary btn-icon" onclick='playSong(${JSON.stringify(song)})' title="Play">▶</button>
            <button class="btn btn-sm btn-danger btn-icon" onclick="removeFromLibrary('${esc(song.videoId)}')" title="Remove">🗑</button>
          </div>
        </div>`;
      el.appendChild(card);
    });
  }

  // ---- History ----
  function addToHistory(song) {
    const h = getHistory();
    const entry = Object.assign({}, song, { playedAt: new Date().toISOString() });
    h.unshift(entry);
    if (h.length > 100) h.pop();
    saveHistory(h);
  }

  function clearHistory() {
    if (!confirm('Clear play history?')) return;
    saveHistory([]);
    renderHistory();
    showToast('History cleared.');
  }

  function renderHistory() {
    const h = getHistory();
    const el = document.getElementById('history-list');
    if (h.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🕐</div><p>No songs played yet.<br>Start singing and your history will appear here!</p></div>';
      return;
    }
    el.innerHTML = '';
    h.forEach(song => {
      const card = document.createElement('div');
      card.className = 'card';
      const d = new Date(song.playedAt);
      const dateStr = d.toLocaleString();
      card.innerHTML = `
        <div class="song-card">
          <img class="thumb" src="${esc(song.thumbnailUrl)}" alt="" loading="lazy">
          <div class="song-info">
            <div class="s-title">${esc(song.title)}</div>
            <div class="s-channel">${esc(song.channelTitle)}</div>
            <div class="s-meta">🕐 ${dateStr}</div>
          </div>
          <div class="song-actions">
            <button class="btn btn-sm btn-primary btn-icon" onclick='addToQueue(${JSON.stringify(song)})' title="Queue Again">+🎶</button>
            <button class="btn btn-sm btn-secondary btn-icon" onclick='playSong(${JSON.stringify(song)})' title="Play Again">▶</button>
          </div>
        </div>`;
      el.appendChild(card);
    });
  }

  // ---- Player ----
  function playSong(song) {
    currentSong = song;
    const bar = document.getElementById('player-bar');
    document.getElementById('player-song-name').textContent = song.title;
    document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${song.videoId}?autoplay=1&rel=0`;
    bar.classList.add('active');
    adjustMainTop();
    showToast('Now playing: ' + song.title.substring(0,30) + '...', 'success');
  }

  function closePlayer() {
    document.getElementById('yt-iframe').src = '';
    document.getElementById('player-bar').classList.remove('active');
    currentSong = null;
    adjustMainTop();
  }

  function markPlayed() {
    if (!currentSong) return;
    addToHistory(currentSong);
    // Remove from queue if it's the first item
    let q = getQueue();
    if (q.length > 0 && q[0].videoId === currentSong.videoId) {
      q.shift();
      q.forEach((s,i) => s.position = i+1);
      saveQueue(q);
      updateQueueBadge();
    }
    showToast('Marked as played! 🎉', 'success');
    closePlayer();
    if (currentTab === 'queue') renderQueue();
    if (currentTab === 'history') renderHistory();
  }

  function adjustMainTop() {
    const bar = document.getElementById('player-bar');
    const main = document.getElementById('main');
    if (bar.classList.contains('active')) {
      const h = bar.offsetHeight;
      main.style.top = (60 + h) + 'px';
    } else {
      main.style.top = '60px';
    }
  }

  // Recalculate on resize
  window.addEventListener('resize', adjustMainTop);

  // ---- Init ----
  updateQueueBadge();
</script>
</body>
</html>

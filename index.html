<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Karaoke Night 🎤</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #eaeaea;
    --muted: #888;
    --border: #2a2a4a;
    --green: #4caf50;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header { background: var(--surface); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 20px; color: var(--accent); font-weight: 700; }
  .header-icons { display: flex; gap: 8px; }
  .icon-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
  .icon-btn:active { background: var(--border); }

  /* TABS */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* PLAYER */
  #player-section { background: #000; position: relative; }
  #player-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
  #youtube-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #player-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; pointer-events: none; }

  /* NOW PLAYING BAR */
  #now-playing-bar { background: var(--card); padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  #np-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--border); }
  #np-info { flex: 1; min-width: 0; }
  #np-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #np-channel { font-size: 11px; color: var(--muted); margin-top: 2px; }
  #player-controls { display: flex; gap: 8px; align-items: center; }
  .ctrl-btn { background: none; border: none; color: var(--text); font-size: 26px; cursor: pointer; padding: 4px; }
  .ctrl-btn.primary { background: var(--accent); border-radius: 50%; width: 42px; height: 42px; font-size: 20px; display: flex; align-items: center; justify-content: center; }
  #fullscreen-btn { font-size: 20px; }

  /* INTRO BADGE */
  #intro-badge { display: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 12px; white-space: nowrap; }

  /* SECTIONS */
  .section { display: none; padding: 0; }
  .section.active { display: block; }

  /* SEARCH */
  #search-section { padding: 16px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 15px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-btn { background: var(--accent); border: none; border-radius: 10px; padding: 10px 16px; color: #fff; font-weight: 700; cursor: pointer; font-size: 15px; }
  .url-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .url-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
  .url-input:focus { border-color: var(--accent2); }
  .url-input::placeholder { color: var(--muted); }
  .url-btn { background: var(--accent2); border: none; border-radius: 10px; padding: 10px 14px; color: #fff; font-weight: 700; cursor: pointer; font-size: 14px; }
  .results-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .song-card { display: flex; gap: 12px; background: var(--card); border-radius: 12px; padding: 10px; margin-bottom: 10px; align-items: center; border: 1px solid var(--border); }
  .song-card img { width: 72px; height: 54px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--border); }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .song-channel { font-size: 11px; color: var(--muted); }
  .song-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .add-btn { border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .add-queue-btn { background: var(--accent); color: #fff; }
  .add-lib-btn { background: var(--card); color: var(--accent2); border: 1px solid var(--accent2); }
  .play-btn { background: var(--green); color: #fff; }

  /* QUEUE */
  #queue-section { padding: 16px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 16px; font-weight: 700; }
  .clear-btn { background: none; border: 1px solid var(--accent); border-radius: 8px; padding: 5px 12px; color: var(--accent); font-size: 12px; cursor: pointer; }
  .queue-item { display: flex; gap: 10px; background: var(--card); border-radius: 12px; padding: 10px; margin-bottom: 8px; align-items: center; border: 1px solid var(--border); position: relative; }
  .queue-item.now-playing-item { border-color: var(--accent); background: #1e0a14; }
  .queue-item.played-item { opacity: 0.45; }
  .queue-drag { color: var(--muted); font-size: 18px; cursor: grab; padding: 0 4px; flex-shrink: 0; }
  .queue-num { color: var(--muted); font-size: 12px; font-weight: 700; width: 20px; text-align: center; flex-shrink: 0; }
  .queue-thumb { width: 56px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--border); }
  .queue-info { flex: 1; min-width: 0; }
  .queue-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-channel { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .queue-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .q-play-btn { background: var(--green); border: none; border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 13px; cursor: pointer; }
  .q-remove-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--muted); font-size: 13px; cursor: pointer; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  /* LIBRARY */
  #library-section { padding: 16px; }
  .lib-search { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 15px; outline: none; margin-bottom: 14px; }
  .lib-search:focus { border-color: var(--accent); }
  .lib-search::placeholder { color: var(--muted); }
  .lib-item { display: flex; gap: 10px; background: var(--card); border-radius: 12px; padding: 10px; margin-bottom: 8px; align-items: center; border: 1px solid var(--border); }
  .lib-thumb { width: 56px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--border); }
  .lib-info { flex: 1; min-width: 0; }
  .lib-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-channel { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .lib-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .lib-queue-btn { background: var(--accent); border: none; border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; }
  .lib-remove-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--muted); font-size: 12px; cursor: pointer; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* LOADING */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state { text-align: center; padding: 30px; }

  /* DRAG OVER */
  .drag-over { border-color: var(--accent) !important; background: #1e0a14 !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>🎤 Karaoke Night</h1>
  <div class="header-icons">
    <button class="icon-btn" onclick="shuffleQueue()" title="Shuffle Queue">🔀</button>
  </div>
</header>

<!-- PLAYER -->
<div id="player-section">
  <div id="player-wrapper">
    <div id="youtube-player"></div>
  </div>
  <div id="now-playing-bar">
    <img id="np-thumb" src="" alt="">
    <div id="np-info">
      <div id="np-title">Loading intro video...</div>
      <div id="np-channel"><span id="intro-badge">🎬 INTRO</span></div>
    </div>
    <div id="player-controls">
      <button class="ctrl-btn" onclick="skipPrev()" title="Previous">⏮</button>
      <button class="ctrl-btn primary" id="play-pause-btn" onclick="togglePlayPause()">⏸</button>
      <button class="ctrl-btn" onclick="skipNext()" title="Skip">⏭</button>
      <button class="ctrl-btn" id="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">🔍 Search</div>
  <div class="tab" onclick="switchTab('queue')">📋 Queue <span id="queue-count-badge"></span></div>
  <div class="tab" onclick="switchTab('library')">📚 Library</div>
</div>

<!-- SEARCH -->
<div id="search-section" class="section active">
  <div class="search-bar">
    <input type="text" class="search-input" id="search-input" placeholder="Search karaoke songs..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="url-bar">
    <input type="text" class="url-input" id="url-input" placeholder="Paste YouTube URL...">
    <button class="url-btn" onclick="addFromUrl()">+ Add</button>
  </div>
  <div id="search-results"></div>
</div>

<!-- QUEUE -->
<div id="queue-section" class="section">
  <div class="section-header">
    <span class="section-title">Up Next</span>
    <button class="clear-btn" onclick="clearQueue()">Clear All</button>
  </div>
  <div id="queue-list"></div>
</div>

<!-- LIBRARY -->
<div id="library-section" class="section">
  <div class="section-header">
    <span class="section-title">My Library</span>
  </div>
  <input type="text" class="lib-search" id="lib-search" placeholder="Filter library..." oninput="renderLibrary()">
  <div id="library-list"></div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// HARDCODED INTRO VIDEO — plays first on every load
// ============================================================
const INTRO_VIDEO = {
  video_id: '5nQtMqbvVqE',
  title: 'Karaoke Night Intro',
  channel_title: '',
  thumbnail_url: 'https://i.ytimg.com/vi/5nQtMqbvVqE/mqdefault.jpg'
};

// ============================================================
// STATE
// ============================================================
let player = null;
let playerReady = false;
let isPlaying = false;
let currentVideoId = null;
let isIntroPlaying = true;
let queue = [];
let library = [];
let currentQueueIndex = -1;
let dragSrcIndex = null;

// ============================================================
// LOCAL STORAGE
// ============================================================
function saveData() {
  localStorage.setItem('kn_queue', JSON.stringify(queue));
  localStorage.setItem('kn_library', JSON.stringify(library));
  localStorage.setItem('kn_queue_index', currentQueueIndex);
}
function loadData() {
  try { queue = JSON.parse(localStorage.getItem('kn_queue') || '[]'); } catch(e) { queue = []; }
  try { library = JSON.parse(localStorage.getItem('kn_library') || '[]'); } catch(e) { library = []; }
  try { currentQueueIndex = parseInt(localStorage.getItem('kn_queue_index') || '-1'); } catch(e) { currentQueueIndex = -1; }
}

// ============================================================
// YOUTUBE IFRAME API
// ============================================================
function onYouTubeIframeAPIReady() {
  player = new YT.Player('youtube-player', {
    height: '100%',
    width: '100%',
    videoId: INTRO_VIDEO.video_id,
    playerVars: {
      autoplay: 1,
      controls: 0,
      modestbranding: 1,
      rel: 0,
      fs: 1,
      playsinline: 1,
      enablejsapi: 1
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  playerReady = true;
  isIntroPlaying = true;
  isPlaying = true;
  setNowPlaying(INTRO_VIDEO, true);
  event.target.playVideo();
}

function onPlayerStateChange(event) {
  const state = event.data;
  if (state === YT.PlayerState.PLAYING) {
    isPlaying = true;
    document.getElementById('play-pause-btn').textContent = '⏸';
  } else if (state === YT.PlayerState.PAUSED) {
    isPlaying = false;
    document.getElementById('play-pause-btn').textContent = '▶';
  } else if (state === YT.PlayerState.ENDED) {
    onVideoEnded();
  }
}

function onVideoEnded() {
  if (isIntroPlaying) {
    // Intro finished — play first song in queue
    isIntroPlaying = false;
    if (queue.length > 0) {
      currentQueueIndex = 0;
      playQueueItem(0);
    } else {
      // No queue, show idle state
      document.getElementById('np-title').textContent = 'Add songs to the queue!';
      document.getElementById('np-channel').innerHTML = '';
      document.getElementById('np-thumb').src = '';
      document.getElementById('intro-badge').style.display = 'none';
    }
  } else {
    // Auto-advance queue
    advanceQueue();
  }
}

// ============================================================
// PLAYER CONTROLS
// ============================================================
function togglePlayPause() {
  if (!playerReady) return;
  if (isPlaying) {
    player.pauseVideo();
  } else {
    player.playVideo();
  }
}

function skipNext() {
  if (isIntroPlaying) {
    isIntroPlaying = false;
    if (queue.length > 0) {
      currentQueueIndex = 0;
      playQueueItem(0);
    }
    return;
  }
  advanceQueue();
}

function skipPrev() {
  if (currentQueueIndex > 0) {
    currentQueueIndex--;
    playQueueItem(currentQueueIndex);
  } else if (isIntroPlaying || currentQueueIndex === 0) {
    // Replay intro
    isIntroPlaying = true;
    currentQueueIndex = -1;
    loadVideo(INTRO_VIDEO.video_id);
    setNowPlaying(INTRO_VIDEO, true);
    renderQueue();
  }
}

function advanceQueue() {
  if (currentQueueIndex < queue.length - 1) {
    currentQueueIndex++;
    playQueueItem(currentQueueIndex);
  } else {
    // Queue finished
    document.getElementById('np-title').textContent = 'Queue finished! Add more songs 🎤';
    document.getElementById('np-channel').innerHTML = '';
    document.getElementById('np-thumb').src = '';
    isPlaying = false;
    document.getElementById('play-pause-btn').textContent = '▶';
    renderQueue();
    saveData();
  }
}

function playQueueItem(index) {
  if (index < 0 || index >= queue.length) return;
  currentQueueIndex = index;
  const song = queue[index];
  loadVideo(song.video_id);
  setNowPlaying(song, false);
  renderQueue();
  saveData();
}

function loadVideo(videoId) {
  if (!playerReady) return;
  currentVideoId = videoId;
  player.loadVideoById(videoId);
}

function setNowPlaying(song, isIntro) {
  document.getElementById('np-title').textContent = song.title || 'Unknown';
  document.getElementById('np-thumb').src = song.thumbnail_url || '';
  const badge = document.getElementById('intro-badge');
  if (isIntro) {
    badge.style.display = 'inline-block';
    document.getElementById('np-channel').innerHTML = '';
    document.getElementById('np-channel').appendChild(badge);
  } else {
    badge.style.display = 'none';
    document.getElementById('np-channel').textContent = song.channel_title || '';
  }
}

function toggleFullscreen() {
  const wrapper = document.getElementById('player-wrapper');
  if (!document.fullscreenElement) {
    wrapper.requestFullscreen && wrapper.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
}

// ============================================================
// QUEUE
// ============================================================
function addToQueue(song) {
  // Don't add if already in queue (by video_id) and not played
  const existing = queue.find(s => s.video_id === song.video_id);
  if (existing) { showToast('Already in queue!'); return; }
  queue.push({ ...song });
  saveData();
  renderQueue();
  showToast('Added to queue!');
}

function removeFromQueue(index) {
  queue.splice(index, 1);
  if (currentQueueIndex >= index && currentQueueIndex > 0) currentQueueIndex--;
  saveData();
  renderQueue();
}

function clearQueue() {
  if (!confirm('Clear the entire queue?')) return;
  queue = [];
  currentQueueIndex = -1;
  saveData();
  renderQueue();
  showToast('Queue cleared');
}

function shuffleQueue() {
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  currentQueueIndex = -1;
  saveData();
  renderQueue();
  showToast('Queue shuffled!');
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  const badge = document.getElementById('queue-count-badge');
  badge.textContent = queue.length > 0 ? ` (${queue.length})` : '';

  if (queue.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>Your queue is empty.<br>Search for songs and add them here!</p></div>`;
    return;
  }
  list.innerHTML = '';
  queue.forEach((song, i) => {
    const isActive = i === currentQueueIndex && !isIntroPlaying;
    const div = document.createElement('div');
    div.className = `queue-item${isActive ? ' now-playing-item' : ''}`;
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = `
      <span class="queue-drag">⠿</span>
      <span class="queue-num">${i + 1}</span>
      <img class="queue-thumb" src="${song.thumbnail_url || ''}" alt="" onerror="this.src=''">
      <div class="queue-info">
        <div class="queue-title">${escHtml(song.title)}</div>
        <div class="queue-channel">${escHtml(song.channel_title || '')}${isActive ? ' ▶ NOW PLAYING' : ''}</div>
      </div>
      <div class="queue-actions">
        <button class="q-play-btn" onclick="playQueueItem(${i})">▶</button>
        <button class="q-remove-btn" onclick="removeFromQueue(${i})">✕</button>
      </div>
    `;
    // Drag events
    div.addEventListener('dragstart', e => { dragSrcIndex = i; e.dataTransfer.effectAllowed = 'move'; div.style.opacity = '0.5'; });
    div.addEventListener('dragend', e => { div.style.opacity = '1'; document.querySelectorAll('.queue-item').forEach(el => el.classList.remove('drag-over')); });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (dragSrcIndex === null || dragSrcIndex === i) return;
      const moved = queue.splice(dragSrcIndex, 1)[0];
      queue.splice(i, 0, moved);
      if (currentQueueIndex === dragSrcIndex) currentQueueIndex = i;
      else if (dragSrcIndex < currentQueueIndex && i >= currentQueueIndex) currentQueueIndex--;
      else if (dragSrcIndex > currentQueueIndex && i <= currentQueueIndex) currentQueueIndex++;
      saveData();
      renderQueue();
    });
    list.appendChild(div);
  });
}

// ============================================================
// LIBRARY
// ============================================================
function addToLibrary(song) {
  const exists = library.find(s => s.video_id === song.video_id);
  if (exists) { showToast('Already in library!'); return; }
  library.unshift({ ...song });
  saveData();
  renderLibrary();
  showToast('Saved to library!');
}

function removeFromLibrary(videoId) {
  library = library.filter(s => s.video_id !== videoId);
  saveData();
  renderLibrary();
}

function renderLibrary() {
  const list = document.getElementById('library-list');
  const filter = document.getElementById('lib-search').value.toLowerCase();
  const filtered = library.filter(s => s.title.toLowerCase().includes(filter) || (s.channel_title || '').toLowerCase().includes(filter));
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📚</div><p>Your library is empty.<br>Save songs to access them anytime!</p></div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach(song => {
    const div = document.createElement('div');
    div.className = 'lib-item';
    div.innerHTML = `
      <img class="lib-thumb" src="${song.thumbnail_url || ''}" alt="" onerror="this.src=''">
      <div class="lib-info">
        <div class="lib-title">${escHtml(song.title)}</div>
        <div class="lib-channel">${escHtml(song.channel_title || '')}</div>
      </div>
      <div class="lib-actions">
        <button class="lib-queue-btn" onclick='addToQueue(${JSON.stringify(song)})'>+ Queue</button>
        <button class="lib-remove-btn" onclick="removeFromLibrary('${song.video_id}')">🗑</button>
      </div>
    `;
    list.appendChild(div);
  });
}

// ============================================================
// SEARCH
// ============================================================
async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  const results = document.getElementById('search-results');
  results.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const q = encodeURIComponent(query + ' karaoke');
    const url = `https://vid.puffyan.us/api/v1/search?q=${q}&type=video&fields=videoId,title,author,videoThumbnails`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Invidious API error');
    const data = await res.json();
    renderSearchResults(data.slice(0, 15));
  } catch(e) {
    // Fallback: try another Invidious instance
    try {
      const q = encodeURIComponent(query + ' karaoke');
      const res = await fetch(`https://invidious.nerdvpn.de/api/v1/search?q=${q}&type=video&fields=videoId,title,author,videoThumbnails`);
      const data = await res.json();
      renderSearchResults(data.slice(0, 15));
    } catch(e2) {
      results.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Search unavailable. Try pasting a YouTube URL directly!</p></div>`;
    }
  }
}

function renderSearchResults(items) {
  const results = document.getElementById('search-results');
  if (!items || items.length === 0) {
    results.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>No results found. Try a different search!</p></div>';
    return;
  }
  results.innerHTML = `<div class="results-label">${items.length} results</div>`;
  items.forEach(item => {
    const videoId = item.videoId;
    const title = item.title || 'Unknown';
    const channel = item.author || '';
    const thumbs = item.videoThumbnails || [];
    const thumb = (thumbs.find(t => t.quality === 'medium') || thumbs[0] || {}).url || `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
    const song = { video_id: videoId, title, channel_title: channel, thumbnail_url: thumb };
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <img src="${thumb}" alt="" onerror="this.src='https://i.ytimg.com/vi/${videoId}/mqdefault.jpg'">
      <div class="song-info">
        <div class="song-title">${escHtml(title)}</div>
        <div class="song-channel">${escHtml(channel)}</div>
      </div>
      <div class="song-actions">
        <button class="add-btn add-queue-btn" onclick='addToQueue(${JSON.stringify(song)})'>+ Queue</button>
        <button class="add-btn add-lib-btn" onclick='addToLibrary(${JSON.stringify(song)})'>♡ Save</button>
        <button class="add-btn play-btn" onclick='playNow(${JSON.stringify(song)})'>▶ Play</button>
      </div>
    `;
    results.appendChild(card);
  });
}

function playNow(song) {
  isIntroPlaying = false;
  // Insert at front of queue or play directly
  const idx = queue.findIndex(s => s.video_id === song.video_id);
  if (idx >= 0) {
    currentQueueIndex = idx;
  } else {
    queue.unshift({ ...song });
    currentQueueIndex = 0;
  }
  loadVideo(song.video_id);
  setNowPlaying(song, false);
  saveData();
  renderQueue();
  showToast('Now playing!');
}

// ============================================================
// ADD FROM URL
// ============================================================
async function addFromUrl() {
  const raw = document.getElementById('url-input').value.trim();
  if (!raw) return;
  const videoId = extractVideoId(raw);
  if (!videoId) { showToast('Invalid YouTube URL'); return; }
  showToast('Fetching video info...');
  try {
    const res = await fetch(`https://vid.puffyan.us/api/v1/videos/${videoId}?fields=title,author,videoThumbnails`);
    const data = await res.json();
    const thumb = (data.videoThumbnails || []).find(t => t.quality === 'medium');
    const song = {
      video_id: videoId,
      title: data.title || 'YouTube Video',
      channel_title: data.author || '',
      thumbnail_url: (thumb || {}).url || `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`
    };
    addToQueue(song);
    document.getElementById('url-input').value = '';
  } catch(e) {
    const song = {
      video_id: videoId,
      title: 'YouTube Video',
      channel_title: '',
      thumbnail_url: `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`
    };
    addToQueue(song);
    document.getElementById('url-input').value = '';
  }
}

function extractVideoId(url) {
  const patterns = [
    /[?&]v=([^&]+)/,
    /youtu\.be\/([^?&]+)/,
    /\/shorts\/([^?&]+)/,
    /\/embed\/([^?&]+)/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabs = ['search', 'queue', 'library'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab + '-section').classList.add('active');
  if (tab === 'queue') renderQueue();
  if (tab === 'library') renderLibrary();
}

// ============================================================
// TOAST
// ============================================================
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// INIT
// ============================================================
loadData();
renderQueue();
renderLibrary();

// Load YouTube IFrame API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
</script>
